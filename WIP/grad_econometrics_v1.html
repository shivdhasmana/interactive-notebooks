
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1916;--ink2:#4a4840;--ink3:#7a7870;--paper:#f8f5ef;--paper2:#f0ece3;--paper3:#e8e2d6;
    --accent:#2d5a8e;--accent2:#c4783c;--accent3:#2a7a4f;--gold:#b89320;--red:#8b2020;
    --mono:'IBM Plex Mono',monospace;--serif:'Source Serif 4',serif;--display:'Playfair Display',serif;
    --r:8px;--shadow:0 2px 12px rgba(0,0,0,.1);
  }
  body{font-family:var(--serif);background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
  
  /* ── HEADER ── */
  .hdr{background:var(--ink);color:var(--paper);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;flex-shrink:0}
  .hdr-title{font-family:var(--display);font-size:18px;font-weight:600;letter-spacing:.01em;color:#f0e8d0}
  .hdr-sub{font-size:12px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-left:auto}
  .progress-pill{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:12px;font-family:var(--mono);color:#d4c9a8}

  /* ── LAYOUT ── */
  .shell{display:flex;flex:1;overflow:hidden;min-height:0}
  
  /* ── SIDEBAR ── */
  .sidebar{width:280px;background:var(--paper2);border-right:.5px solid var(--paper3);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
  .sidebar-section{padding:12px 16px 4px;font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
  .nav-item{display:flex;align-items:flex-start;gap:10px;padding:8px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
  .nav-item:hover{background:var(--paper3)}
  .nav-item.active{background:rgba(45,90,142,.08);border-left-color:var(--accent)}
  .nav-num{font-family:var(--mono);font-size:11px;color:var(--ink3);min-width:20px;margin-top:2px;flex-shrink:0}
  .nav-label{font-size:13px;color:var(--ink2);line-height:1.35}
  .nav-item.active .nav-label{color:var(--accent);font-weight:600}
  .nav-item.done .nav-num::after{content:'✓';color:var(--accent3)}
  
  /* ── MAIN ── */
  .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
  .content-area{max-width:820px;margin:0 auto;padding:32px 40px;width:100%}
  
  /* ── MODULE HEADER ── */
  .mod-header{margin-bottom:28px}
  .mod-tag{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
  .mod-title{font-family:var(--display);font-size:32px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:10px}

  .meta-chip{background:var(--paper3);border-radius:20px;padding:3px 10px;font-family:var(--mono);font-size:11px}
  
  /* ── TABS ── */
  .tabs{display:flex;gap:0;border-bottom:1.5px solid var(--paper3);margin-bottom:24px}
  .tab{padding:8px 18px;font-size:13px;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .15s}
  .tab:hover{color:var(--ink)}

  .lecture p:last-child{margin-bottom:0}
  .lecture h3{font-family:var(--display);font-size:20px;font-weight:600;color:var(--ink);margin:24px 0 10px}
  .lecture h4{font-size:14px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin:20px 0 8px}
  .callout{background:rgba(45,90,142,.07);border-left:3px solid var(--accent);border-radius:0 var(--r) var(--r) 0;padding:14px 18px;margin:16px 0;font-size:14px;line-height:1.65}
  .callout.warning{background:rgba(196,120,60,.07);border-left-color:var(--accent2)}
  .callout.insight{background:rgba(42,122,79,.07);border-left-color:var(--accent3)}
  .eq-block{background:var(--ink);color:#f0e8d0;border-radius:var(--r);padding:16px 20px;margin:16px 0;font-family:var(--mono);font-size:14px;line-height:1.8;overflow-x:auto}
  .eq-block .comment{color:var(--ink3);font-style:italic}

  .matrix{display:inline-flex;flex-direction:column;gap:3px;position:relative;padding:8px 4px}
  .matrix::before,.matrix::after{content:'';position:absolute;top:0;bottom:0;width:6px;border:1.5px solid var(--ink);border-radius:2px 0 0 2px}
  .matrix::before{left:0;border-right:none}
  .matrix::after{right:0;border-left:none;border-radius:0 2px 2px 0}
  .matrix-row{display:flex;gap:10px}
  .matrix-cell{font-family:var(--mono);font-size:13px;min-width:36px;text-align:center;color:var(--ink)}
  .matrix-cell.blue{color:var(--accent);font-weight:500}
  .matrix-cell.orange{color:var(--accent2);font-weight:500}
  .mat-op{font-family:var(--mono);font-size:18px;color:var(--ink3);align-self:center}
  .mat-label{font-family:var(--mono);font-size:11px;color:var(--ink3);text-align:center;margin-top:4px}

  /* ── INTERACTIVE ── */
  .interactive-panel{background:var(--paper2);border:1px solid var(--paper3);border-radius:12px;padding:20px;margin:20px 0}
  .interactive-panel h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent2);margin-bottom:16px}
  .slider-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .slider-label{font-size:13px;color:var(--ink2);min-width:110px;font-family:var(--mono);font-size:12px}
  .slider-row input[type=range]{flex:1}
  .slider-val{font-family:var(--mono);font-size:13px;color:var(--accent);min-width:50px;text-align:right}
  .result-box{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r);padding:14px;font-family:var(--mono);font-size:13px;margin-top:12px}
  .result-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid var(--paper3)}
  .result-row:last-child{border:none;padding-top:8px;font-weight:500;color:var(--accent)}
  .result-key{color:var(--ink3)}
  .result-val{color:var(--ink)}

  /* ── CANVAS ── */
  canvas{width:100%;height:200px;background:var(--paper);border-radius:var(--r);border:1px solid var(--paper3);display:block}
  
  /* ── QUIZ ── */
  .quiz-q{font-size:15px;line-height:1.65;margin-bottom:16px;color:var(--ink)}
  .quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .quiz-opt{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r);padding:10px 16px;cursor:pointer;font-size:14px;color:var(--ink2);transition:all .15s;display:flex;align-items:center;gap:10px}
  .quiz-opt:hover{border-color:var(--accent);background:rgba(45,90,142,.04)}
  .quiz-opt.correct{background:rgba(42,122,79,.1);border-color:var(--accent3);color:var(--accent3)}
  .quiz-opt.wrong{background:rgba(139,32,32,.08);border-color:var(--red);color:var(--red)}
  .quiz-feedback{font-size:14px;line-height:1.65;padding:12px 16px;border-radius:var(--r);margin-top:8px}
  .quiz-feedback.correct{background:rgba(42,122,79,.1);color:var(--accent3);border:1px solid rgba(42,122,79,.2)}
  .quiz-feedback.wrong{background:rgba(139,32,32,.07);color:var(--red);border:1px solid rgba(139,32,32,.15)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1.5px solid var(--accent);border-radius:20px;background:transparent;color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .15s;letter-spacing:.04em}
  .btn:hover{background:var(--accent);color:#fff}
  .btn.secondary{border-color:var(--paper3);color:var(--ink3)}
  .btn.secondary:hover{background:var(--paper3);color:var(--ink)}
  
  /* ── PROGRESS ── */
  .prog-bar-wrap{height:3px;background:var(--paper3);border-radius:2px;margin-bottom:24px}
  .prog-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .4s}

  /* ── FOOTER NAV ── */
  .foot-nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-top:1px solid var(--paper3);margin-top:32px}
  
  /* ── TOOLTIP ── */

  /* ── CONCEPT CARDS ── */
  .concept-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin:16px 0}
  .concept-card{background:var(--paper);border:1px solid var(--paper3);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .15s}
  .concept-card:hover{border-color:var(--accent);transform:translateY(-1px)}
  .concept-card .cc-icon{font-size:22px;margin-bottom:6px}
  .concept-card .cc-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:4px}
  .concept-card .cc-desc{font-size:12px;color:var(--ink3);line-height:1.45}

  /* ── AI TUTOR ── */
  .ai-section{background:linear-gradient(135deg,rgba(45,90,142,.06),rgba(45,90,142,.02));border:1px solid rgba(45,90,142,.15);border-radius:12px;padding:20px;margin-top:24px}
  .ai-section h4{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:12px}
  .ai-prompts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .ai-prompt-btn{background:var(--paper);border:1px solid var(--paper3);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--ink2);cursor:pointer;transition:all .15s}
  .ai-prompt-btn:hover{border-color:var(--accent);color:var(--accent)}
  .ai-response{background:var(--paper);border-radius:var(--r);padding:14px;font-size:14px;line-height:1.7;color:var(--ink);min-height:60px;display:none}
  .ai-response.visible{display:block}
  .ai-loading{display:none;align-items:center;gap:8px;font-size:13px;color:var(--ink3);padding:14px}
  .ai-loading.visible{display:flex}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dot-bounce .9s infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes dot-bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

  /* scrollbar */
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--paper3);border-radius:3px}
</style>

<div class="hdr">
  <div style="width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;color:#fff;font-weight:500">Ec</div>
  <div class="hdr-title">Graduate Econometrics</div>

</div>

<div class="shell">

  <nav class="sidebar" id="sidebar">

        <div class="prog-bar" id="overall-bar" style="width:12.5%"></div>
      </div>

    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">

      <!-- Dynamic content rendered here -->
    </div>
  </main>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────
const MODULES = [
  {
    id:1, title:"Multiple Linear Regression", tag:"Module 1",
    lectures:13, icon:"∑",
    summary:"The matrix approach to OLS estimation, properties of estimators, goodness of fit.",
    topics:["Matrix Approach to OLS","OLS Estimation & Properties","Partial Regression Coefficients","Goodness of Fit: R² & Adj-R²","Interpretation"],
    lecture:`
<h3>The Multiple Regression Model</h3>
<p>In econometrics, we rarely believe that a single variable explains an outcome. The <strong>multiple linear regression model</strong> extends the simple bivariate case to accommodate several regressors simultaneously, each capturing an independent marginal effect.</p>
<p>The population model for <em>n</em> observations and <em>k</em> regressors (including the intercept) is written compactly using matrix notation:</p>
<div class="eq-label">The Classical Linear Regression Model</div>
<div class="eq-block">
<span style="color:#f0e8d0;font-weight:500">y</span> = <span style="color:#aed4f5">X</span><span style="color:#f0c47a">β</span> + <span style="color:#f07a7a">ε</span>

  where:
    <span style="color:#f0e8d0">y</span>  = (n × 1) vector of the dependent variable
    <span style="color:#aed4f5">X</span>  = (n × k) matrix of regressors [1  x₁  x₂  ... x_{k-1}]
    <span style="color:#f0c47a">β</span>  = (k × 1) vector of unknown parameters
    <span style="color:#f07a7a">ε</span>  = (n × 1) vector of disturbances
</div>

<h4>The Design Matrix</h4>
<p>The matrix <strong>X</strong> (called the <em>design matrix</em> or <em>regressor matrix</em>) has a column of ones as its first column — representing the intercept — followed by columns for each independent variable:</p>
<div class="matrix-wrap">
  <div>
    <div class="mat-label" style="color:var(--accent)">X (n×k)</div>
    <div class="matrix">
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">x₁₁</div><div class="matrix-cell">x₁₂</div><div class="matrix-cell">⋯</div><div class="matrix-cell">x₁ₖ</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">x₂₁</div><div class="matrix-cell">x₂₂</div><div class="matrix-cell">⋯</div><div class="matrix-cell">x₂ₖ</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">⋮</div><div class="matrix-cell">⋮</div><div class="matrix-cell">⋮</div><div class="matrix-cell">⋱</div><div class="matrix-cell">⋮</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">xₙ₁</div><div class="matrix-cell">xₙ₂</div><div class="matrix-cell">⋯</div><div class="matrix-cell">xₙₖ</div></div>
    </div>
  </div>
  <div class="mat-op">=</div>
  <div>
    <div class="mat-label" style="color:var(--accent)">Intercept column</div>
    <div class="matrix">
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">⋯</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">⋯</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">⋮</div><div class="matrix-cell">⋯</div></div>
      <div class="matrix-row"><div class="matrix-cell blue">1</div><div class="matrix-cell">⋯</div></div>
    </div>
  </div>
</div>
<p>The first column (all ones) times β₀ produces a constant term in every predicted value — this is the <em>intercept</em>.</p>

<h3>OLS Estimation: The Normal Equations</h3>
<p>Ordinary Least Squares minimises the residual sum of squares:</p>
<div class="eq-block">
min<sub>β</sub> S(β) = <span style="color:#f07a7a">ε</span>′<span style="color:#f07a7a">ε</span> = (<span style="color:#f0e8d0">y</span> − <span style="color:#aed4f5">X</span><span style="color:#f0c47a">β</span>)′(<span style="color:#f0e8d0">y</span> − <span style="color:#aed4f5">X</span><span style="color:#f0c47a">β</span>)
</div>
<p>Taking the derivative with respect to β and setting it to zero yields the <strong>Normal Equations</strong>:</p>
<div class="eq-block">
<span style="color:#aed4f5">X</span>′<span style="color:#aed4f5">X</span> <span style="color:#f0c47a">β̂</span> = <span style="color:#aed4f5">X</span>′<span style="color:#f0e8d0">y</span>

Provided (X′X) is non-singular, the unique OLS estimator is:
  <span style="color:#f0c47a">β̂</span> = (<span style="color:#aed4f5">X</span>′<span style="color:#aed4f5">X</span>)⁻¹ <span style="color:#aed4f5">X</span>′<span style="color:#f0e8d0">y</span>
</div>
<div class="callout">
  <strong>Key insight:</strong> The non-singularity of (X′X) requires that no exact linear relationship exists among the regressors. If it does, the matrix is singular, the inverse doesn't exist, and we have <em>perfect multicollinearity</em> — OLS breaks down.
</div>

<h3>Gauss-Markov Assumptions</h3>
<p>Under the following Classical Assumptions, OLS has optimal properties:</p>
<div class="callout insight">
  <strong>GM-1 Linearity:</strong> y = Xβ + ε (the model is correctly specified)<br><br>
  <strong>GM-2 Full rank:</strong> rank(X) = k, no perfect multicollinearity<br><br>
  <strong>GM-3 Strict exogeneity:</strong> E[ε | X] = 0 (regressors are uncorrelated with errors)<br><br>
  <strong>GM-4 Spherical disturbances:</strong> Var[ε | X] = σ²I (homoscedasticity + no autocorrelation)<br><br>
  <strong>GM-5 Normality (optional for OLS, needed for inference):</strong> ε | X ~ N(0, σ²I)
</div>

<h3>The Gauss-Markov Theorem</h3>
<p>Under GM-1 through GM-4, the OLS estimator β̂ is <strong>BLUE</strong>:</p>
<div class="callout">
  <strong>B</strong>est — minimum variance among all linear unbiased estimators<br>
  <strong>L</strong>inear — a linear function of y<br>
  <strong>U</strong>nbiased — E[β̂] = β<br>
  <strong>E</strong>stimator
</div>

<h4>Properties of β̂</h4>
<div class="eq-block">
E[β̂] = β                        <span class="comment">// unbiased</span>
Var[β̂] = σ²(X′X)⁻¹              <span class="comment">// variance-covariance matrix</span>
β̂ ~ N(β, σ²(X′X)⁻¹)             <span class="comment">// under normality assumption</span>
σ̂² = e′e / (n−k)                <span class="comment">// unbiased estimator of σ²</span>
</div>

<h3>Partial Regression Coefficients</h3>
<p>A crucial difference from simple regression: each coefficient <strong>β̂ⱼ</strong> measures the marginal effect of xⱼ on y <em>holding all other regressors constant</em>. This is the <em>ceteris paribus</em> interpretation.</p>
<div class="callout warning">
  <strong>The Frisch-Waugh-Lovell theorem</strong> formalises this: β̂ⱼ obtained from the full regression equals the coefficient from regressing the residuals of y on X₋ⱼ onto the residuals of xⱼ on X₋ⱼ. OLS <em>partials out</em> the other regressors.
</div>

<h3>Goodness of Fit</h3>
<div class="eq-block">
TSS = ESS + RSS
  TSS = Σ(yᵢ − ȳ)²   <span class="comment">// total sum of squares</span>
  ESS = Σ(ŷᵢ − ȳ)²   <span class="comment">// explained sum of squares</span>
  RSS = Σeᵢ²          <span class="comment">// residual sum of squares</span>

R² = ESS/TSS = 1 − RSS/TSS   ∈ [0,1]

Adjusted R² = 1 − (RSS/(n−k)) / (TSS/(n−1))
            = 1 − (1−R²) · (n−1)/(n−k)
</div>
<div class="callout warning">
  <strong>Warning:</strong> R² never decreases when you add a regressor, even an irrelevant one! Always use Adjusted R² (which penalises for degrees of freedom) when comparing models with different numbers of regressors.
</div>
`,
    interactive_id:"mlr-sim",
    quiz:[
      {q:"What does the OLS estimator β̂ = (X′X)⁻¹X′y require for existence?",opts:["Normal distribution of errors","Non-singularity of (X′X)","Homoscedastic errors","n > 100 observations"],ans:1,exp:"The OLS estimator requires (X′X) to be invertible (non-singular). This fails when there is exact multicollinearity among regressors — when one regressor can be written as a perfect linear combination of others."},
      {q:"Adjusted R² penalises for additional regressors because:",opts:["It uses RSS instead of ESS","It divides by degrees of freedom, not sample size","It accounts for heteroscedasticity","It requires normally distributed errors"],ans:1,exp:"Adj-R² = 1 − (RSS/(n−k))/(TSS/(n−1)). The (n−k) in the denominator of RSS penalises each additional regressor by consuming a degree of freedom. If a new regressor adds no explanatory power, Adj-R² will fall."},
      {q:"The Gauss-Markov theorem guarantees that OLS is BLUE under assumptions GM-1 to:",opts:["GM-3 (strict exogeneity)","GM-4 (spherical disturbances)","GM-5 (normality)","All five assumptions"],ans:1,exp:"The Gauss-Markov theorem requires GM-1 through GM-4 only. Normality (GM-5) is NOT required for OLS to be BLUE — it is needed for exact finite-sample inference (t-tests, F-tests). With GM-5, OLS is also the MLE."},
    ]
  },
  {
    id:2, title:"Specification Analysis", tag:"Module 2",
    lectures:10, icon:"⚠",
    summary:"Consequences of including or excluding variables, functional form, measurement error.",
    topics:["Omitted Variable Bias","Irrelevant Variable Inclusion","Functional Form Misspecification","RESET Test","Measurement Error"],
    lecture:`
<h3>Why Specification Matters</h3>
<p>An econometric model is only as good as its specification. Even with perfect data, a misspecified model produces biased, inconsistent, or inefficient estimates. Specification analysis examines the consequences of getting the model wrong.</p>

<h3>Omission of Relevant Variables (Underfitting)</h3>
<p>Suppose the true model is:</p>
<div class="eq-block">
y = β₁ + β₂x₂ + β₃x₃ + ε     <span class="comment">// true model</span>
</div>
<p>But we estimate the <em>short regression</em>, omitting x₃:</p>
<div class="eq-block">
y = α₁ + α₂x₂ + u             <span class="comment">// misspecified model</span>
</div>
<p>The OVB formula tells us the bias in the OLS estimator for β₂:</p>
<div class="eq-block">
E[α̂₂] = β₂ + β₃ · δ₃₂

where δ₃₂ = Cov(x₃, x₂) / Var(x₂)    <span class="comment">// auxiliary regression coefficient</span>

Bias = β₃ · δ₃₂
</div>
<div class="callout warning">
  <strong>Omitted Variable Bias (OVB)</strong> arises when: (1) the omitted variable is a determinant of y (β₃ ≠ 0) AND (2) the omitted variable is correlated with an included regressor (δ₃₂ ≠ 0). Both conditions must hold simultaneously.
</div>

<h4>Direction of Bias</h4>
<p>You can determine the <em>sign</em> of the bias even without data — just reason about the signs of β₃ and δ₃₂:</p>
<div class="result-box" style="margin:0 0 16px">
  <div class="result-row"><div class="result-key">β₃ > 0, δ₃₂ > 0</div><div class="result-val" style="color:var(--accent2)">Upward bias (α̂₂ overestimates β₂)</div></div>
  <div class="result-row"><div class="result-key">β₃ > 0, δ₃₂ < 0</div><div class="result-val" style="color:var(--accent)">Downward bias</div></div>
  <div class="result-row"><div class="result-key">β₃ < 0, δ₃₂ > 0</div><div class="result-val" style="color:var(--accent)">Downward bias</div></div>
  <div class="result-row"><div class="result-key">β₃ < 0, δ₃₂ < 0</div><div class="result-val" style="color:var(--accent2)">Upward bias</div></div>
</div>

<h3>Inclusion of Irrelevant Variables (Overfitting)</h3>
<p>Now suppose we add a variable x₃ that has <em>no</em> effect on y (β₃ = 0):</p>
<div class="callout insight">
  <strong>Result:</strong> OLS remains <em>unbiased and consistent</em> — including irrelevant variables does not cause bias. However, it is <strong>inefficient</strong>: the variances of all coefficient estimates increase. Standard errors become larger, t-statistics shrink, and confidence intervals widen. This is the cost of overfitting.
</div>

<h3>Functional Form Misspecification</h3>
<p>The relationship between variables may not be linear. Common transformations:</p>
<div class="eq-block">
Log-Linear (log-log):    ln(y) = β₁ + β₂ln(x) + ε
  → β₂ is the elasticity: % change in y per % change in x

Semi-log (log-lin):      ln(y) = β₁ + β₂x + ε
  → β₂ × 100 ≈ % change in y per unit change in x

Polynomial:              y = β₁ + β₂x + β₃x² + ε
  → allows inverted-U or U-shaped relationships

Reciprocal:              y = β₁ + β₂(1/x) + ε
  → asymptotic relationship
</div>

<h3>The RESET Test (Ramsey, 1969)</h3>
<p>The Regression Specification Error Test checks whether the functional form is correct by testing whether powers of the fitted values (ŷ) belong in the model:</p>
<div class="eq-block">
Step 1: Estimate y = Xβ + ε, save fitted values ŷ
Step 2: Estimate augmented regression:
         y = Xβ + γ₁ŷ² + γ₂ŷ³ + u
Step 3: Test H₀: γ₁ = γ₂ = 0
        Reject H₀ → evidence of functional form misspecification
</div>

<h3>Measurement Error</h3>
<p>When variables are measured with error, the consequences depend on whether the error is in y or in x.</p>
<div class="callout">
  <strong>Error in y:</strong> If y* = y + v (observed = true + noise), and v is uncorrelated with x, OLS remains unbiased and consistent. Only precision is lost (larger σ²).
</div>
<div class="callout warning">
  <strong>Errors-in-variables (error in x):</strong> If x* = x + w (observed = true + noise), OLS is <em>biased toward zero</em> — the "attenuation bias". The estimated coefficient is:
  <div class="eq-block" style="margin:10px 0 0">
  plim β̂ = β · σ²ₓ / (σ²ₓ + σ²_w) = β · (SNR / (1 + SNR))
  </div>
  This ratio is the <em>signal-to-noise ratio</em>. More measurement error → greater attenuation → greater bias toward zero.
</div>
`,
    interactive_id:"ovb-sim",
    quiz:[
      {q:"Omitted Variable Bias in the coefficient on x₂ occurs only when:",opts:["The sample size is small","The omitted variable affects y AND is correlated with x₂","The model has heteroscedasticity","The omitted variable is continuous"],ans:1,exp:"OVB requires BOTH conditions: the omitted variable must be a determinant of y (non-zero true coefficient) AND must be correlated with included regressors. If either condition fails, there is no bias — even though the model is technically misspecified."},
      {q:"Adding an irrelevant variable to an OLS regression:",opts:["Biases all remaining coefficients","Leaves coefficient estimates unbiased but inflates their variances","Reduces R²","Causes the model to be unidentified"],ans:1,exp:"Including irrelevant variables preserves unbiasedness (E[β̂] = β still holds) but reduces efficiency. Variances of all coefficient estimates increase because the irrelevant variable absorbs some variation it shares with other regressors — inflating all standard errors."},
      {q:"Classical measurement error in the regressor x causes:",opts:["Upward bias in the slope","No bias at all","Attenuation bias — coefficient biased toward zero","Heteroscedastic standard errors"],ans:2,exp:"Errors-in-variables in x causes attenuation bias: the OLS estimate is biased toward zero. The intuition is that measurement noise in x adds random variation uncorrelated with y, diluting the apparent relationship. The attenuation factor is σ²ₓ/(σ²ₓ + σ²_w)."},
    ]

  {
    id:3, title:"Dummy Variable Models", tag:"Module 3",
    lectures:12, icon:"Δ",
    summary:"Qualitative regressors, structural breaks, LPM, Logit, and Probit models.",
    topics:["Dummy Variables & ANOVA","ANCOVA & Dummy Variable Trap","Structural Break (Chow Test)","Interaction Effects","LPM, Logit, Probit"],
    lecture:`
<h3>Dummy Variables</h3>
<p>Many economically important variables are qualitative — gender, region, recession status, policy regime. We encode these using <strong>dummy variables</strong> (also called indicator or binary variables) that take values 0 or 1.</p>
<div class="eq-block">
y = β₁ + β₂D + β₃x + ε

  D = 1 if observation belongs to group (e.g. female, treated, post-policy)
  D = 0 otherwise (the reference / base category)

Interpretation:
  β₁ = intercept for reference group
  β₁ + β₂ = intercept for dummy group
  β₂ = differential intercept = average y difference between groups,
       holding x constant
</div>

<h3>The Dummy Variable Trap</h3>
<div class="callout warning">
  <strong>Never include all categories!</strong> If a qualitative variable has m categories, include only (m−1) dummies. Including all m creates <em>perfect multicollinearity</em> — the dummies sum to the intercept column (a column of ones), making (X′X) singular. This is called the <strong>Dummy Variable Trap</strong>.
</div>

<h3>ANOVA and ANCOVA</h3>
<p>Analysis of Variance (ANOVA) tests whether group means differ. In the regression framework:</p>
<div class="eq-block">
ANOVA:   y = β₁ + β₂D₂ + β₃D₃ + ... + ε       <span class="comment">// only dummies, no continuous X</span>
ANCOVA:  y = β₁ + β₂D + β₃x + ε                 <span class="comment">// dummies + continuous regressors</span>
</div>
<p>ANCOVA allows different intercepts but the <em>same slope</em> for each group. To allow different slopes, add <strong>interaction terms</strong>:</p>
<div class="eq-block">
y = β₁ + β₂D + β₃x + β₄(D·x) + ε

  β₃ = slope for reference group
  β₃ + β₄ = slope for dummy group
  β₄ = differential slope coefficient
</div>

<h3>Testing for Structural Break: Chow Test</h3>
<p>The Chow test examines whether regression coefficients are the same in two sub-periods (e.g. before and after a policy change):</p>
<div class="eq-block">
H₀: β₁ = β₂ (same coefficients in both periods)
H₁: At least one coefficient differs

F = [(RSS_R − RSS_U) / k] / [RSS_U / (n−2k)]

  RSS_R = RSS from restricted model (pooled regression)
  RSS_U = RSS₁ + RSS₂ (sum from two separate regressions)
  k = number of parameters (including intercept)

Under H₀: F ~ F(k, n−2k)
</div>

<h3>Qualitative Response Models</h3>
<p>When the dependent variable y is binary (0 or 1), OLS becomes the <strong>Linear Probability Model (LPM)</strong>, but it has severe limitations:</p>
<div class="callout warning">
  <strong>LPM problems:</strong> (1) Predicted probabilities can fall outside [0,1], (2) Errors are necessarily heteroscedastic, (3) The linear relationship is implausible for probabilities near 0 or 1.
</div>
<h4>Logit and Probit Models</h4>
<p>Both Logit and Probit map a linear index (Xβ) to a probability through an S-shaped (sigmoid) function:</p>
<div class="eq-block">
Logit:   P(y=1|X) = Λ(Xβ) = exp(Xβ) / (1 + exp(Xβ))   <span class="comment">// logistic CDF</span>
Probit:  P(y=1|X) = Φ(Xβ)                               <span class="comment">// standard normal CDF</span>

Estimated by Maximum Likelihood Estimation (MLE), not OLS.

Marginal effect for Logit: ∂P/∂xⱼ = βⱼ · Λ(Xβ) · [1 − Λ(Xβ)]
Marginal effect for Probit: ∂P/∂xⱼ = βⱼ · φ(Xβ)       <span class="comment">// φ = standard normal PDF</span>

Note: Coefficients are NOT marginal effects! Must compute at mean or use AME.
</div>
<div class="callout insight">
  <strong>Logit vs Probit:</strong> In practice, both give nearly identical marginal effects. Logit coefficients ≈ 1.6 × Probit coefficients (because the logistic distribution has variance π²/3 ≈ 3.29 vs 1 for standard normal). Logit has a convenient odds-ratio interpretation: exp(βⱼ) is the odds ratio.
</div>
`,
    interactive_id:"logit-sim",
    quiz:[
      {q:"The Dummy Variable Trap arises because:",opts:["Too many observations","All category dummies plus intercept create perfect multicollinearity","Categorical variables violate normality","Dummy variables are not continuous"],ans:1,exp:"If you include dummies for ALL m categories plus an intercept, the sum of all dummies equals the intercept column (all ones). This is an exact linear relationship among columns of X — perfect multicollinearity — making (X′X) singular and OLS undefined."},
      {q:"In the Logit model, exp(βⱼ) represents:",opts:["The marginal effect of xⱼ","The odds ratio — the factor by which odds of y=1 multiply per unit change in xⱼ","The probability of y=1","The log-likelihood contribution"],ans:1,exp:"In the Logit model, the log-odds of y=1 is linear in X. Therefore exp(βⱼ) is the multiplicative factor by which the odds [P(y=1)/P(y=0)] change for a one-unit increase in xⱼ, ceteris paribus. This is the odds ratio interpretation."},
      {q:"The Chow test for structural break requires:",opts:["Homoscedastic errors across the two groups","Two separate regressions plus a pooled regression","Maximum Likelihood Estimation","Panel data"],ans:1,exp:"The Chow test uses: F = [(RSS_pooled − RSS₁ − RSS₂)/k] / [(RSS₁+RSS₂)/(n−2k)]. You need (1) a pooled restricted regression giving RSS_pooled, and (2) two separate sub-period regressions giving RSS₁ and RSS₂. The unrestricted RSS is their sum."},
    ]
  },
  {
    id:4, title:"Simultaneous-Equation Models", tag:"Module 4",
    lectures:10, icon:"⇌",
    summary:"Structural and reduced form models, identification, ILS and 2SLS.",
    topics:["Simultaneous Equations Bias","Structural vs Reduced Form","Identification Problem","Order & Rank Conditions","ILS and 2SLS"],
    lecture:`
<h3>The Problem of Simultaneity</h3>
<p>In many economic systems, variables are jointly determined. Consider a simple supply-demand system:</p>
<div class="eq-block">
Demand: Qd = α₁ + α₂P + α₃Y + u₁     <span class="comment">// Y = income</span>
Supply: Qs = β₁ + β₂P + β₃W + u₂     <span class="comment">// W = input wage</span>
Equilibrium: Qd = Qs = Q
</div>
<p>Here P and Q are <em>endogenous</em> — determined jointly by the system. Y and W are <em>exogenous</em> — determined outside the system.</p>

<h3>Simultaneous Equation Bias</h3>
<div class="callout warning">
  <strong>OLS is biased and inconsistent for structural parameters.</strong> In the demand equation, P is correlated with the error u₁ (because any shock to demand shifts P in equilibrium). The GM assumption E[ε|X]=0 is violated. This is <em>simultaneity bias</em>.
</div>
<div class="eq-block">
plim(α̂₂ᴼᴸˢ) ≠ α₂    <span class="comment">// OLS is inconsistent!</span>
</div>

<h3>Structural vs Reduced Form</h3>
<p>The <strong>structural form</strong> contains the economic behavioural equations. The <strong>reduced form</strong> expresses each endogenous variable as a function of <em>only exogenous variables</em>:</p>
<div class="eq-block">
Structural form:
  Q = α₁ + α₂P + α₃Y + u₁
  Q = β₁ + β₂P + β₃W + u₂

Reduced form (solve for P and Q in terms of Y, W):
  P = π₁₁ + π₁₂Y + π₁₃W + v₁
  Q = π₂₁ + π₂₂Y + π₂₃W + v₂

The π coefficients are called reduced form coefficients.
OLS consistently estimates the πs — but we ultimately want the αs and βs.
</div>

<h3>The Identification Problem</h3>
<p>Can we recover structural parameters from reduced form estimates? This is the <em>identification problem</em>.</p>
<h4>Order Condition (necessary but not sufficient)</h4>
<div class="eq-block">
For each equation, let:
  G = number of endogenous variables in the system
  K = number of exogenous variables in the system
  g = endogenous variables in this equation
  k = exogenous variables in this equation

Order Condition:
  K − k ≥ g − 1

  K−k = # of excluded exogenous variables
  g−1 = # of included endogenous variables minus 1

  K−k = g−1 → Exactly identified
  K−k > g−1 → Over-identified
  K−k < g−1 → Under-identified (cannot be estimated)
</div>

<h3>2SLS: Two-Stage Least Squares</h3>
<p>2SLS is the workhorse estimator for over- or exactly-identified equations:</p>
<div class="eq-block">
Stage 1: Regress each endogenous RHS variable on ALL exogenous variables.
         Obtain fitted values P̂ (the "purged" endogenous variable).

Stage 2: Replace the endogenous variable with P̂ and estimate by OLS.

Intuition: P̂ is the component of P explained purely by exogenous
           instruments — it is uncorrelated with the structural error.
           Using P̂ instead of P removes the endogeneity.
</div>
<div class="callout insight">
  <strong>Instrument validity requires:</strong> (1) <em>Relevance</em>: instrument must be correlated with the endogenous variable (testable — first-stage F > 10 as rule of thumb). (2) <em>Exogeneity</em>: instrument must be uncorrelated with the structural error (untestable in just-identified case — requires economic reasoning).
</div>
`,

      {q:"In 2SLS, the first stage serves to:",opts:["Test for heteroscedasticity","Purge the endogenous variable of its correlation with the structural error","Estimate reduced form coefficients","Test the Hausman specification test"],ans:1,exp:"In Stage 1 of 2SLS, we regress the endogenous RHS variable on all exogenous variables (instruments). The fitted value P̂ is the component of P explained by exogenous instruments — it has the same relationship with y as P, but is uncorrelated with the structural error by construction."},
    ]

  {
    id:5, title:"Dynamic Econometric Models", tag:"Module 5",
    lectures:15, icon:"t",
    summary:"Distributed lag models, Koyck, adaptive expectations, partial adjustment, Granger causality.",
    topics:["Lags in Economics","Koyck Distributed Lag","Adaptive Expectations Model","Partial Adjustment Model","Granger Causality"],
    lecture:`
<h3>Why Lags?</h3>
<p>Economic relationships often involve time delays — agents adjust gradually, expectations form slowly, capital takes time to install. Four main reasons for lags in econometric models:</p>
<div class="callout">
  <strong>1. Psychological inertia:</strong> Habits — consumption patterns adjust gradually to income changes.<br><br>
  <strong>2. Technological reasons:</strong> Capital is not immediately adjustable (putty-clay capital).<br><br>
  <strong>3. Institutional constraints:</strong> Contracts, regulations prevent instantaneous response.<br><br>
  <strong>4. Expectation lags:</strong> Agents base decisions on expected future values, formed from past data.
</div>

<h3>Infinite Distributed Lag Model</h3>
<div class="eq-block">
yₜ = α + β₀xₜ + β₁xₜ₋₁ + β₂xₜ₋₂ + ... + εₜ
   = α + Σⱼ₌₀^∞ βⱼ xₜ₋ⱼ + εₜ

  βⱼ = lag weight at lag j (impact multiplier at horizon j)
  Σβⱼ = long-run multiplier (total effect of permanent unit change in x)
</div>

<h3>Koyck Distributed Lag</h3>
<p>Estimating infinitely many lag coefficients is infeasible. Koyck (1954) imposes the geometric decay restriction:</p>
<div class="eq-block">
βⱼ = β₀λʲ,    0 < λ < 1     <span class="comment">// weights decline geometrically</span>

This transforms the model to:
  yₜ = α(1−λ) + β₀xₜ + λyₜ₋₁ + vₜ

  vₜ = εₜ − λεₜ₋₁             <span class="comment">// MA(1) error — OLS problematic!</span>

  λ = rate of decay = speed of adjustment
  Median lag = −log(2)/log(λ)
  Mean lag = λ/(1−λ)
</div>
<div class="callout warning">
  <strong>OLS problems with Koyck:</strong> The transformed error vₜ is a moving average process. Since yₜ₋₁ is correlated with εₜ₋₁, the lagged dependent variable is correlated with the error → OLS is biased and inconsistent. Use IV or ML estimation.
</div>

<h3>Adaptive Expectations Model</h3>
<div class="eq-block">
Structural: yₜ = α + βxₜ* + εₜ       <span class="comment">// y depends on expected x</span>

Expectations formation:
  xₜ* − xₜ₋₁* = δ(xₜ − xₜ₋₁*)      <span class="comment">// 0 < δ ≤ 1 (learning rate)</span>
  xₜ* = δxₜ + (1−δ)xₜ₋₁*            <span class="comment">// weighted average of past values</span>

After substitution: mathematically equivalent to Koyck with λ = 1−δ
  δ = 1: perfect foresight (rational expectations special case)
  δ → 0: very slow expectation adjustment
</div>

<h3>Partial Adjustment Model</h3>
<div class="eq-block">
Desired level: yₜ* = α + βxₜ + εₜ     <span class="comment">// optimal y given x</span>

Adjustment equation:
  yₜ − yₜ₋₁ = γ(yₜ* − yₜ₋₁)         <span class="comment">// 0 < γ ≤ 1 (adjustment speed)</span>

After substitution:
  yₜ = αγ + βγxₜ + (1−γ)yₜ₋₁ + γεₜ

  γ = coefficient of adjustment
  βγ = short-run effect of x
  β = long-run effect (divide short-run by γ)
</div>

<h3>Granger Causality</h3>
<p>Does x "Granger-cause" y? Test whether past x helps predict y beyond what past y alone predicts:</p>
<div class="eq-block">
Test regression:
  yₜ = α₀ + Σᵢ αᵢyₜ₋ᵢ + Σⱼ βⱼxₜ₋ⱼ + εₜ

H₀: β₁ = β₂ = ... = βₘ = 0    <span class="comment">// x does NOT Granger-cause y</span>

F-test on the joint significance of lagged x terms.

Warning: Granger causality is about predictability, NOT structural causation!
</div>
`,
    interactive_id:"koyck-sim",
    quiz:[
      {q:"In the Koyck model, OLS is biased because:",opts:["The model has too many lags","The lagged dependent variable is correlated with the MA(1) error","The geometric weights don't sum to 1","The sample is too small"],ans:1,exp:"The Koyck transformation introduces an error vₜ = εₜ − λεₜ₋₁, a moving average error. Since yₜ₋₁ depends on εₜ₋₁ (it was part of last period's error), and vₜ also depends on εₜ₋₁, the regressor yₜ₋₁ is correlated with vₜ → OLS is biased and inconsistent."},
      {q:"In the Partial Adjustment Model, the short-run effect of x is:",opts:["β (the full structural coefficient)","βγ (structural coefficient × adjustment speed)","β/γ","γ alone"],ans:1,exp:"In the partial adjustment model, the estimated coefficient on xₜ is βγ — the product of the true long-run effect β and the adjustment speed γ. Since γ ∈ (0,1], the short-run effect is always smaller than (or equal to) the long-run effect β = (short-run)/γ."},
      {q:"Granger causality tests whether:",opts:["x structurally causes y in a causal diagram","Past values of x help predict y beyond what past y alone predicts","x leads y in a cointegrating relationship","The VAR model is stable"],ans:1,exp:"Granger (1969) defines x as Granger-causing y if past x improves forecasts of y even after controlling for past y. This is a statistical statement about predictive content — it does NOT imply structural or economic causation. Two variables can Granger-cause each other without any causal mechanism."},
    ]
  },
  {
    id:6, title:"Time Series Econometrics", tag:"Module 6",
    lectures:15, icon:"~",
    summary:"Stationarity, unit roots, cointegration, ECM, ARIMA, Box-Jenkins methodology.",
    topics:["Stationary vs Non-Stationary","Spurious Regression","Unit Root Tests (ADF)","Cointegration & ECM","ARIMA & Box-Jenkins"],
    lecture:`
<h3>Stochastic Processes and Stationarity</h3>
<p>A <strong>stochastic process</strong> {yₜ} is <em>strictly stationary</em> if its joint probability distribution is time-invariant. In practice we use <em>weak (covariance) stationarity</em>:</p>
<div class="eq-block">
Weak stationarity requires:
  1.  E[yₜ] = μ        (constant mean)
  2.  Var[yₜ] = σ²     (constant variance)
  3.  Cov(yₜ, yₜ₋ₖ) = γₖ depends only on |k|, not t
</div>

<h3>The Random Walk and Non-Stationarity</h3>
<div class="eq-block">
Random Walk:          yₜ = yₜ₋₁ + εₜ
Random Walk + Drift:  yₜ = δ + yₜ₋₁ + εₜ

Properties of Random Walk:
  E[yₜ] = y₀          (constant mean — satisfies condition 1)
  Var[yₜ] = tσ²        ← grows without bound — NOT stationary!
  Corr(yₜ, yₜ₋ₛ) = √(1 − s/t) → 1 as t → ∞
</div>

<h3>Spurious Regression</h3>
<div class="callout warning">
  <strong>Granger & Newbold (1974):</strong> If two independent random walks are regressed on each other, we almost always find a "significant" relationship — high R², significant t-statistics — even though there is <em>no true relationship</em>. This is spurious regression. The usual t and F distributions do not apply to non-stationary data.
</div>
<p>The Durbin-Watson statistic approaching 0 (severe positive autocorrelation in residuals) is a classic symptom of spurious regression.</p>

<h3>Unit Root Tests</h3>
<h4>Dickey-Fuller (DF) Test</h4>
<div class="eq-block">
Test regression:  Δyₜ = ρyₜ₋₁ + εₜ

H₀: ρ = 0  (unit root — non-stationary)
H₁: ρ < 0  (stationary)

Critical values are NON-standard (more negative than standard t-values).
  1%: −3.43   5%: −2.86   10%: −2.57  (approximately)

Three versions:
  (1) No constant, no trend: Δyₜ = ρyₜ₋₁ + εₜ
  (2) Constant only:         Δyₜ = α + ρyₜ₋₁ + εₜ
  (3) Constant + trend:      Δyₜ = α + βt + ρyₜ₋₁ + εₜ
</div>
<h4>Augmented Dickey-Fuller (ADF)</h4>
<div class="eq-block">
Add lagged differences to control for serial correlation:
  Δyₜ = α + βt + ρyₜ₋₁ + Σᵢ δᵢΔyₜ₋ᵢ + εₜ

Number of lags chosen by AIC, SIC, or general-to-specific.
</div>

<h3>Cointegration</h3>
<p>Two I(1) variables are <strong>cointegrated</strong> if there exists a linear combination that is I(0) — stationary. Economic intuition: a long-run equilibrium relationship tethers the two series together despite individual non-stationarity.</p>
<div class="callout insight">
  <strong>Engle-Granger (1987) 2-step method:</strong><br>
  Step 1: Regress y on x → save residuals ê<br>
  Step 2: ADF test on ê. If ê ~ I(0), series are cointegrated (use special critical values).
</div>

<h3>Error Correction Mechanism (ECM)</h3>
<div class="eq-block">
If yₜ and xₜ are cointegrated with vector [1, −β]:
  Δyₜ = γ₀ + γ₁Δxₜ + γ₂(yₜ₋₁ − βxₜ₋₁) + εₜ
                         ↑
               error correction term (ECT)

  γ₂ < 0 ensures reversion to equilibrium (γ₂ is the adjustment speed)
  γ₁ = short-run effect of Δx
  β = long-run relationship

Granger Representation Theorem: Two I(1) series are cointegrated ↔ there exists a valid ECM representation.
</div>

<h3>ARIMA Models & Box-Jenkins</h3>
<div class="eq-block">
AR(p):    yₜ = φ₁yₜ₋₁ + ... + φₚyₜ₋ₚ + εₜ
MA(q):    yₜ = εₜ + θ₁εₜ₋₁ + ... + θqεₜ₋q
ARMA(p,q): combines both
ARIMA(p,d,q): ARMA applied to the dth difference of yₜ

Box-Jenkins Methodology:
  Step 1: IDENTIFICATION — examine ACF/PACF to suggest p,q,d
  Step 2: ESTIMATION — MLE or nonlinear LS
  Step 3: DIAGNOSTIC — check residuals are white noise (Ljung-Box Q test)
  Step 4: FORECASTING — if model passes diagnostics
</div>

<h3>What is Panel Data?</h3>
<p>Panel data (also called longitudinal or cross-sectional time series data) combines observations on <em>N</em> cross-sectional units (individuals, firms, countries) over <em>T</em> time periods. This gives N×T observations in total.</p>
<div class="callout insight">
  <strong>Advantages of panel data:</strong><br>
  • Controls for unobserved individual heterogeneity<br>
  • More variation, less multicollinearity, more degrees of freedom<br>
  • Able to study dynamics of adjustment<br>
  • Can identify effects impossible to detect in pure cross-section or time series
</div>

<h3>The Panel Model with Individual Effects</h3>
<div class="eq-block">
yᵢₜ = αᵢ + β′xᵢₜ + εᵢₜ,    i=1,...,N;  t=1,...,T

  αᵢ = individual-specific intercept (fixed or random)
  xᵢₜ = k×1 vector of regressors
  εᵢₜ ~ iid(0, σ²ε)

Three cases:
  1. Constant coefficients: αᵢ = α (pool: OLS on stacked data)
  2. Fixed effects: αᵢ is a parameter to estimate
  3. Random effects: αᵢ ~ iid(0, σ²α), independent of x
</div>

<h3>Fixed Effects: LSDV Approach</h3>
<p>Include N−1 dummy variables for individuals (Least Squares Dummy Variable estimator):</p>
<div class="eq-block">
yᵢₜ = Σᵢ αᵢDᵢ + β′xᵢₜ + εᵢₜ

Dᵢ = 1 if observation belongs to unit i, 0 otherwise.

Equivalent to including N−1 dummies (drop one for reference).
Problem: When N is large, estimating N intercepts is computationally intensive.
</div>

<h3>Fixed Effects: Within-Group Estimator</h3>
<p>Computationally more efficient — demean each variable by its individual time-mean:</p>
<div class="eq-block">
Define: ȳᵢ = (1/T)Σₜ yᵢₜ,   x̄ᵢ = (1/T)Σₜ xᵢₜ

Demeaned model: (yᵢₜ − ȳᵢ) = β′(xᵢₜ − x̄ᵢ) + (εᵢₜ − ε̄ᵢ)
                 ÿᵢₜ = β′ẍᵢₜ + ε̈ᵢₜ

OLS on demeaned data = Within estimator = identical to LSDV.
The demeaning removes the individual fixed effects entirely!

Important: Time-invariant variables are eliminated (ẍᵢₜ = 0 for time-invariant x).
</div>

<h3>Random Effects Model</h3>
<div class="eq-block">
yᵢₜ = α + β′xᵢₜ + (αᵢ − α) + εᵢₜ
     = α + β′xᵢₜ + uᵢ + εᵢₜ

  Composite error: ωᵢₜ = uᵢ + εᵢₜ
  Var(ωᵢₜ) = σ²u + σ²ε
  Cov(ωᵢₜ, ωᵢₛ) = σ²u ≠ 0 for t≠s    <span class="comment">// within-unit correlation</span>

RE uses GLS (Feasible GLS) to account for this error structure.
RE is more efficient than FE IF the individual effects are uncorrelated with x.
</div>

<h3>Hausman Test: FE vs RE</h3>
<div class="eq-block">
H₀: Cov(αᵢ, xᵢₜ) = 0    <span class="comment">// RE is consistent and efficient</span>
H₁: Cov(αᵢ, xᵢₜ) ≠ 0    <span class="comment">// RE is inconsistent, FE is consistent</span>

Hausman statistic:
  H = (β̂FE − β̂RE)′ [Var(β̂FE) − Var(β̂RE)]⁻¹ (β̂FE − β̂RE)
  H ~ χ²(k) under H₀

Rule: Reject H₀ → use Fixed Effects
      Fail to reject → prefer Random Effects (more efficient)
</div>
`,
    interactive_id:null,

      {q:"The Within-Group (demeaning) estimator removes individual fixed effects because:",opts:["It uses instrumental variables","Subtracting individual time-means eliminates any time-invariant individual component including αᵢ","It uses GLS to account for heteroscedasticity","It estimates N separate regressions"],ans:1,exp:"When we subtract the individual time-mean from each variable, any time-invariant quantity vanishes. Since αᵢ is constant over time for unit i, it is subtracted out: (αᵢ − ᾱᵢ) = 0. This is why FE cannot identify the coefficients of time-invariant variables — they are removed along with the fixed effect."},

    ]

    lecture:`
<h3>From Theory to Empirics</h3>
<p>A well-designed empirical project begins with a theoretically motivated question, then builds backward to a tractable econometric strategy. The most common mistake is to collect data first and then search for a question — this leads to data mining and spurious findings.</p>

<h3>The Empirical Research Template</h3>
<div class="callout insight">
  <strong>1. Economic Question:</strong> What causal relationship or mechanism are you testing? What does theory predict?<br><br>
  <strong>2. Identification Strategy:</strong> How do you plan to establish causation (or defend a correlational claim)? OLS? IV? DiD? RDD?<br><br>
  <strong>3. Data Strategy:</strong> What data will measure your variables? Are there measurement error concerns? Is there selection bias?<br><br>
  <strong>4. Estimation:</strong> What estimator? What are its assumptions? Are they plausible?<br><br>
  <strong>5. Robustness:</strong> How do your results change with alternative specifications, samples, or assumptions?
</div>

<h3>Model Selection</h3>
<div class="eq-block">
Criteria for model selection:
  AIC = −2 log L + 2k           <span class="comment">// Akaike — penalises parameters lightly</span>
  BIC = −2 log L + k log(n)     <span class="comment">// Bayesian — heavier penalty for large n</span>

  Lower AIC/BIC = preferred model.
  BIC is consistent (selects true model asymptotically).
  AIC is efficient (better out-of-sample forecasting).

General-to-specific (Hendry): Start with rich unrestricted model,
  test down by eliminating insignificant variables.
</div>

<h3>Common Pitfalls in Empirical Work</h3>
<div class="callout warning">
  <strong>1. Endogeneity:</strong> Have you thought carefully about whether your key regressor is correlated with the error? Sources: reverse causality, omitted variables, measurement error.<br><br>
  <strong>2. Spurious regression:</strong> Did you check your time series for unit roots before regressing?<br><br>
  <strong>3. Overfitting:</strong> A model that fits this data perfectly may forecast poorly. Use Adj-R², AIC, BIC, or out-of-sample validation.<br><br>
  <strong>4. p-hacking:</strong> Running many specifications and reporting only the significant ones inflates Type I errors. Pre-register your specification if possible.<br><br>
  <strong>5. External validity:</strong> Can your findings from this sample/context generalise to the population of interest?
</div>

<h3>Reporting Econometric Results</h3>
<div class="callout">
  A complete econometric table should report: coefficient estimates, standard errors (in parentheses, below coefficients), significance stars with a clear key, sample size N, R² or Pseudo-R², information criteria where relevant, and a note on the estimation method. Always report <em>heteroscedasticity-robust</em> standard errors unless you have a strong reason not to.
</div>

<h3>Checklist for Your Dissertation</h3>
<div class="result-box">
  <div class="result-row"><div class="result-key">Economic motivation</div><div class="result-val" style="color:var(--accent3)">Theory → testable hypothesis</div></div>
  <div class="result-row"><div class="result-key">Data description</div><div class="result-val" style="color:var(--accent3)">Sources, period, coverage, summary stats</div></div>
  <div class="result-row"><div class="result-key">Specification</div><div class="result-val" style="color:var(--accent3)">Variables, functional form, controls</div></div>
  <div class="result-row"><div class="result-key">Stationarity tests</div><div class="result-val" style="color:var(--accent3)">If time series data is used</div></div>
  <div class="result-row"><div class="result-key">Diagnostic tests</div><div class="result-val" style="color:var(--accent3)">Heteroscedasticity, autocorrelation, RESET</div></div>
  <div class="result-row"><div class="result-key">Robustness checks</div><div class="result-val" style="color:var(--accent3)">Alternative specs, subsamples</div></div>
  <div class="result-row"><div class="result-key">Economic interpretation</div><div class="result-val" style="color:var(--accent3)">Magnitude, sign, significance</div></div>
</div>
`,

      <div class="slider-row"><span class="slider-label">AR coefficient ρ</span><input type="range" id="ts-rho" min="0.0" max="1.05" value="0.9" step="0.01" oninput="updateTS()"><span class="slider-val" id="ts-rhov">0.90</span></div>
      <div class="slider-row"><span class="slider-label">Seed (resimulate)</span><input type="range" id="ts-seed" min="1" max="50" value="1" step="1" oninput="updateTS()"><span class="slider-val" id="ts-seedv">1</span></div>
      <canvas id="ts-canvas" height="220"></canvas>
      <div class="result-box" id="ts-results"></div>
    </div>
  `;
  return `<div class="interactive-panel"><p style="font-size:14px;color:var(--ink3);text-align:center;padding:40px">Interactive simulation for this module coming soon. Use the Lecture and Quiz tabs.</p></div>`;
}

function initInteractive(id) {
  if (id==='mlr-sim') updateMLR();
  else if (id==='ovb-sim') updateOVB();
  else if (id==='logit-sim') updateLogit();
  else if (id==='koyck-sim') updateKoyck();
  else if (id==='ts-sim') updateTS();
}

// ── MLR SIM ──
function updateMLR() {
  const b1=+document.getElementById('b1').value;
  const b2=+document.getElementById('b2').value;
  const sigma=+document.getElementById('sigma').value;
  const n=+document.getElementById('nn').value;
  document.getElementById('b1v').textContent=b1.toFixed(1);
  document.getElementById('b2v').textContent=b2.toFixed(1);
  document.getElementById('sigmav').textContent=sigma.toFixed(1);
  document.getElementById('nnv').textContent=n;
  
  // Generate data
  const x=[],y=[];
  for(let i=0;i<n;i++){
    const xi=(-3+Math.random()*6);
    const yi=b1+b2*xi+rnorm()*sigma;
    x.push(xi);y.push(yi);
  }
  // OLS
  const xm=mean(x),ym=mean(y);
  let sxy=0,sxx=0;
  for(let i=0;i<n;i++){sxy+=(x[i]-xm)*(y[i]-ym);sxx+=(x[i]-xm)**2;}
  const b2hat=sxy/sxx, b1hat=ym-b2hat*xm;
  const yhat=x.map(xi=>b1hat+b2hat*xi);
  const resid=y.map((yi,i)=>yi-yhat[i]);
  const rss=resid.reduce((a,r)=>a+r*r,0);
  const tss=y.reduce((a,yi)=>a+(yi-ym)**2,0);
  const r2=1-rss/tss;
  const adjr2=1-(rss/(n-2))/(tss/(n-1));
  const se2=rss/(n-2);
  const seb2=Math.sqrt(se2/sxx);
  const t=b2hat/seb2;
  
  // Draw
  const canvas=document.getElementById('mlr-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*2;canvas.height=440;
  ctx.scale(2,2);
  const W=canvas.offsetWidth,H=220;
  const pad=30;
  ctx.clearRect(0,0,W,H);
  // axes
  const xmin=Math.min(...x)-0.5,xmax=Math.max(...x)+0.5;
  const ymin=Math.min(...y)-1,ymax=Math.max(...y)+1;
  const px=xi=>(xi-xmin)/(xmax-xmin)*(W-2*pad)+pad;
  const py=yi=>(ymax-yi)/(ymax-ymin)*(H-2*pad)+pad;
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.stroke();
  // scatter
  ctx.fillStyle='rgba(45,90,142,.5)';
  for(let i=0;i<n;i++){ctx.beginPath();ctx.arc(px(x[i]),py(y[i]),2.5,0,2*Math.PI);ctx.fill();}
  // fitted line
  ctx.strokeStyle='#c4783c';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(px(xmin),py(b1hat+b2hat*xmin));ctx.lineTo(px(xmax),py(b1hat+b2hat*xmax));ctx.stroke();
  // true line
  ctx.strokeStyle='rgba(42,122,79,.6)';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(px(xmin),py(b1+b2*xmin));ctx.lineTo(px(xmax),py(b1+b2*xmax));ctx.stroke();
  ctx.setLineDash([]);
  
  document.getElementById('mlr-results').innerHTML=`
    <div class="result-row"><div class="result-key">True β₁</div><div class="result-val">${b1.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">Estimated β̂₁</div><div class="result-val">${b1hat.toFixed(3)}</div></div>
    <div class="result-row"><div class="result-key">True β₂</div><div class="result-val">${b2.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">Estimated β̂₂</div><div class="result-val">${b2hat.toFixed(3)} (t = ${t.toFixed(2)})</div></div>
    <div class="result-row"><div class="result-key">R²</div><div class="result-val">${r2.toFixed(4)}</div></div>
    <div class="result-row"><div class="result-key">Adj. R²</div><div class="result-val" style="color:var(--accent)">${adjr2.toFixed(4)}</div></div>
  `;
}

// ── OVB SIM ──
function updateOVB() {
  const b2=+document.getElementById('beta2').value;
  const b3=+document.getElementById('beta3').value;
  const d32=+document.getElementById('delta32').value;
  document.getElementById('beta2v').textContent=b2.toFixed(1);
  document.getElementById('beta3v').textContent=b3.toFixed(1);
  document.getElementById('delta32v').textContent=d32.toFixed(2);
  const bias=b3*d32;
  const alpha2=b2+bias;
  document.getElementById('ovb-results').innerHTML=`
    <div class="result-row"><div class="result-key">True β₂</div><div class="result-val">${b2.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">OVB = β₃ × Corr(x₃,x₂)</div><div class="result-val" style="color:${Math.abs(bias)>0.5?'var(--accent2)':'var(--ink3)'}">${bias.toFixed(3)}</div></div>
    <div class="result-row"><div class="result-key">Estimated α̂₂ (biased)</div><div class="result-val">${alpha2.toFixed(3)}</div></div>
    <div class="result-row"><div class="result-key">Bias direction</div><div class="result-val">${bias>0.01?'↑ Upward bias':bias<-0.01?'↓ Downward bias':'≈ No bias'}</div></div>
    <div class="result-row"><div class="result-key">Relative bias</div><div class="result-val" style="color:var(--accent)">${b2!==0?((bias/b2)*100).toFixed(1)+'%':'—'}</div></div>
  `;
}

// ── LOGIT SIM ──
function updateLogit() {
  const beta=+document.getElementById('logit-beta').value;
  const alpha=+document.getElementById('logit-alpha').value;
  document.getElementById('logit-betav').textContent=beta.toFixed(1);
  document.getElementById('logit-alphav').textContent=alpha.toFixed(1);
  const canvas=document.getElementById('logit-canvas');
  if(!canvas)return;
  canvas.width=canvas.offsetWidth*2;canvas.height=440;
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  const W=canvas.offsetWidth,H=220,pad=36;
  ctx.clearRect(0,0,W,H);
  const xmin=-4,xmax=4;
  const px=xi=>(xi-xmin)/(xmax-xmin)*(W-2*pad)+pad;
  const py=p=>H-pad-p*(H-2*pad);
  // grid
  ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=0.5;
  [0,0.25,0.5,0.75,1].forEach(p=>{ctx.beginPath();ctx.moveTo(pad,py(p));ctx.lineTo(W-pad,py(p));ctx.stroke();});
  // axes
  ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.stroke();
  // logit
  ctx.strokeStyle='#2d5a8e';ctx.lineWidth=2.5;ctx.beginPath();
  let first=true;
  for(let xi=xmin;xi<=xmax;xi+=0.05){
    const idx=alpha+beta*xi;
    const p=1/(1+Math.exp(-idx));
    if(first){ctx.moveTo(px(xi),py(p));first=false;}else ctx.lineTo(px(xi),py(p));
  }ctx.stroke();
  // probit
  ctx.strokeStyle='#c4783c';ctx.lineWidth=2.5;ctx.setLineDash([6,3]);ctx.beginPath();first=true;
  for(let xi=xmin;xi<=xmax;xi+=0.05){
    const p=normcdf(alpha+0.625*beta*xi);
    if(first){ctx.moveTo(px(xi),py(p));first=false;}else ctx.lineTo(px(xi),py(p));
  }ctx.stroke();ctx.setLineDash([]);
  // lpm
  ctx.strokeStyle='#2a7a4f';ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();
  const p0=0.1+alpha*0.08,p1=0.1+alpha*0.08+beta*0.2;
  ctx.moveTo(px(xmin),py(p0));ctx.lineTo(px(xmax),py(p1));ctx.stroke();ctx.setLineDash([]);
  // labels
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.font='10px monospace';
  ['0','0.25','0.5','0.75','1.0'].forEach((l,i)=>{ctx.fillText(l,5,py([0,0.25,0.5,0.75,1][i])+3);});
}

// ── KOYCK SIM ──
function updateKoyck() {
  const beta0=+document.getElementById('k-beta').value;
  const lambda=+document.getElementById('k-lambda').value;
  document.getElementById('k-betav').textContent=beta0.toFixed(1);
  document.getElementById('k-lambdav').textContent=lambda.toFixed(2);
  const T=25;
  const lags=Array.from({length:T},(_,j)=>beta0*Math.pow(lambda,j));
  const canvas=document.getElementById('koyck-canvas');
  if(!canvas)return;
  canvas.width=canvas.offsetWidth*2;canvas.height=440;
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  const W=canvas.offsetWidth,H=220,pad=36;
  ctx.clearRect(0,0,W,H);
  const ymax=beta0*1.1;
  const px=j=>pad+j/(T-1)*(W-2*pad);
  const py=v=>H-pad-Math.max(0,v)/ymax*(H-2*pad);
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();
  lags.forEach((v,j)=>{
    ctx.fillStyle=`rgba(45,90,142,${0.8-j/T*0.5})`;
    const bw=(W-2*pad)/T*0.6;
    ctx.fillRect(px(j)-bw/2,py(v),bw,H-pad-py(v));
  });
  const longRun=beta0/(1-lambda);
  const median=-Math.log(2)/Math.log(lambda);
  document.getElementById('koyck-results').innerHTML=`
    <div class="result-row"><div class="result-key">Impact multiplier (j=0)</div><div class="result-val">${beta0.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">Long-run multiplier</div><div class="result-val">${longRun.toFixed(3)}</div></div>
    <div class="result-row"><div class="result-key">Median lag</div><div class="result-val">${median.toFixed(2)} periods</div></div>
    <div class="result-row"><div class="result-key">Mean lag λ/(1-λ)</div><div class="result-val" style="color:var(--accent)">${(lambda/(1-lambda)).toFixed(2)} periods</div></div>
  `;
}

// ── TS SIM ──
function updateTS() {
  const rho=+document.getElementById('ts-rho').value;
  const seed=+document.getElementById('ts-seed').value;
  document.getElementById('ts-rhov').textContent=rho.toFixed(2);
  document.getElementById('ts-seedv').textContent=seed;
  const T=150;
  const rng=seeded(seed);
  const yt=[0];
  for(let t=1;t<T;t++) yt.push(rho*yt[t-1]+(rng()-0.5)*3);
  const canvas=document.getElementById('ts-canvas');
  if(!canvas)return;
  canvas.width=canvas.offsetWidth*2;canvas.height=440;
  const ctx=canvas.getContext('2d');
  ctx.scale(2,2);
  const W=canvas.offsetWidth,H=220,pad=30;
  ctx.clearRect(0,0,W,H);
  const ymin=Math.min(...yt)-1,ymax=Math.max(...yt)+1;
  const px=t=>pad+t/(T-1)*(W-2*pad);
  const py=v=>pad+(ymax-v)/(ymax-ymin)*(H-2*pad);
  ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(pad,py(0));ctx.lineTo(W-pad,py(0));ctx.stroke();
  ctx.strokeStyle=rho>=1?'#8b2020':rho>0.9?'#c4783c':'#2d5a8e';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px(0),py(yt[0]));
  yt.forEach((v,t)=>{if(t>0)ctx.lineTo(px(t),py(v));});ctx.stroke();
  const variance=yt.reduce((a,v)=>a+v*v,0)/T;
  document.getElementById('ts-results').innerHTML=`
    <div class="result-row"><div class="result-key">AR coefficient ρ</div><div class="result-val">${rho.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">Process type</div><div class="result-val" style="color:${rho>=1?'var(--red)':rho>0.9?'var(--accent2)':'var(--accent3)'}">${rho>=1?'Non-stationary (unit root)':rho>0.9?'Near unit root':'Stationary'}</div></div>
    <div class="result-row"><div class="result-key">Sample variance</div><div class="result-val">${variance.toFixed(2)}</div></div>
    <div class="result-row"><div class="result-key">Theoretical variance</div><div class="result-val" style="color:var(--accent)">${rho<1?(2.25/(1-rho*rho)).toFixed(2):'∞ (grows with t)'}</div></div>
  `;
}

// ─── QUIZ ─────────────────────────────────────────────────────────────
function renderQuiz(m) {
  return m.quiz.map((q,qi)=>`
    <div style="margin-bottom:32px;padding-bottom:24px;border-bottom:.5px solid var(--paper3)">
      <div style="font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.07em">Question ${qi+1} of ${m.quiz.length}</div>
      <div class="quiz-q">${q.q}</div>
      <div class="quiz-opts" id="opts-${qi}">
        ${q.opts.map((opt,oi)=>`<div class="quiz-opt" onclick="answerQuiz(${qi},${oi})" id="opt-${qi}-${oi}">
          <span style="font-family:var(--mono);font-size:11px;color:var(--ink3);min-width:16px">${['A','B','C','D'][oi]}</span>
          ${opt}
        </div>`).join('')}
      </div>
      <div id="fb-${qi}" style="display:none"></div>
    </div>
  `).join('');
}

function answerQuiz(qi,oi) {
  const m = MODULES[currentModule];
  const q = m.quiz[qi];
  if(quizState[qi]!==undefined) return;
  quizState[qi]=oi;
  const opts=document.querySelectorAll(`#opts-${qi} .quiz-opt`);
  opts.forEach((o,i)=>{
    if(i===q.ans)o.classList.add('correct');
    else if(i===oi&&oi!==q.ans)o.classList.add('wrong');
  });
  const fb=document.getElementById(`fb-${qi}`);
  const correct=oi===q.ans;
  fb.innerHTML=`<div class="quiz-feedback ${correct?'correct':'wrong'}">${correct?'✓ Correct! ':'✗ Not quite. '} ${q.exp}</div>`;
  fb.style.display='block';
}

// ─── UTILITIES ───────────────────────────────────────────────────────
function mean(arr){return arr.reduce((a,v)=>a+v,0)/arr.length}
let _rnorm_spare=null,_rnorm_has_spare=false;
function rnorm(){
  if(_rnorm_has_spare){_rnorm_has_spare=false;return _rnorm_spare;}
  let u,v,s;
  do{u=Math.random()*2-1;v=Math.random()*2-1;s=u*u+v*v;}while(s>=1||s===0);
  const m=Math.sqrt(-2*Math.log(s)/s);
  _rnorm_spare=v*m;_rnorm_has_spare=true;return u*m;
}
function normcdf(x){
  const a1=0.319381530,a2=-0.356563782,a3=1.781477937,a4=-1.821255978,a5=1.330274429;
  const k=1/(1+0.2316419*Math.abs(x));
  const p=1-0.3989422803*Math.exp(-x*x/2)*(((((a5*k+a4)*k+a3)*k+a2)*k+a1)*k);
  return x<0?1-p:p;
}
function seeded(seed){
  let s=seed*9301+49297;
  return()=>{s=(s*9301+49297)%233280;return s/233280;};
}
